version: "3.8"

services:
  online:
    build:
      context: ./services/online
      dockerfile: Dockerfile
    image: catcord/online:latest
    container_name: online_service
    restart: unless-stopped
    environment:
      - ONLINE_ALLOWLIST_ROOMS=${ONLINE_ALLOWLIST_ROOMS:-}
    volumes:
      - /var/lib/catcord/online:/state:rw
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  memory:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    image: catcord/memory:latest
    container_name: memory_service
    restart: unless-stopped
    environment:
      - IDENTITY_API_URL=${IDENTITY_API_URL:-}
      - IDENTITY_API_KEY=${IDENTITY_API_KEY:-}
      - IDENTITY_API_TIMEOUT_S=${IDENTITY_API_TIMEOUT_S:-3}
    volumes:
      - /var/lib/catcord/memory:/state:rw
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cleaner:
    build:
      context: ./cleaner
      dockerfile: Dockerfile
    image: catcord/cleaner:latest
    container_name: cleaner_bot
    restart: "no"
    volumes:
      - ./cleaner/config.yaml:/config/config.yaml:ro
      - /var/lib/catcord/cleaner:/state:rw
      - /srv/media:/srv/media:rw
    networks:
      - internal

  cleaner-event:
    build:
      context: ./cleaner
      dockerfile: Dockerfile
    image: catcord/cleaner:latest
    container_name: cleaner_event
    restart: unless-stopped
    command: ["python", "-u", "event_main.py"]
    volumes:
      - ./cleaner/config.yaml:/config/config.yaml:ro
      - /var/lib/catcord/cleaner:/state:rw
      - /srv/media:/srv/media:rw
    networks:
      - internal

  news:
    build:
      context: ./news
      dockerfile: Dockerfile
    image: catcord/news:latest
    container_name: news_bot
    restart: "no"
    volumes:
      - ./news/config.yaml:/config/config.yaml:ro
      - /var/lib/catcord/news:/state:rw
    networks:
      - internal

networks:
  internal:
    external: true
    name: catcord_internal
